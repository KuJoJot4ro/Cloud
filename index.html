<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Aesthetic Experience</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00d4ff;
            --secondary-color: #ff007a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Mesh Gradient Background */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            animation: rotate 20s linear infinite;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: move 10s ease-in-out infinite alternate;
        }

        .blob-1 { width: 400px; height: 400px; background: var(--accent-color); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--secondary-color); bottom: -10%; right: -10%; animation-delay: -2s; }
        .blob-3 { width: 300px; height: 300px; background: #7000ff; top: 40%; left: 30%; animation-delay: -5s; }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Typography & Effects */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 2px rgba(255,255,255,0.1)); }
            to { filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }
        }

        /* Mouse Follower Glow (Optional JS needed for full effect, but CSS radial works) */
        .card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            background: radial-gradient(600px circle at var(--x) var(--y), rgba(255,255,255,0.06), transparent 40%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card" id="card">
        <h1>Hello World 🌍</h1>
        <p>Made using VS Code Web 😎</p>
    </div>

    <script>
        // Smooth Mouse Tracking for the card glow
        const card = document.getElementById('card');
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--x', `${x}px`);
            card.style.setProperty('--y', `${y}px`);
        });
    </script>

</body>
</html>
