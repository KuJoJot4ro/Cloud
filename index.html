<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERPUNK_OS_V7.2</title>
    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00f3ff;
            --neon-yellow: #f3ea5f;
            --dark-bg: #0a0a0c;
            --glass: rgba(0, 243, 255, 0.05);
            --font-main: 'Courier New', Courier, monospace;
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-blue); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }

        @keyframes border-pulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.5; filter: brightness(1.5); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--dark-bg);
            color: var(--neon-blue);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Scanline CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 101;
            background: linear-gradient(0deg, rgba(0, 243, 255, 0) 0%, rgba(0, 243, 255, 0.1) 50%, rgba(0, 243, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        /* Neural Background */
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
            opacity: 0.3;
        }

        /* Main Container */
        .viewport {
            position: relative;
            width: 90vw;
            height: 80vh;
            border: 1px solid rgba(0, 243, 255, 0.2);
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            padding: 20px;
            z-index: 10;
        }

        /* Side UI Elements */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 10px;
            color: var(--neon-pink);
            overflow: hidden;
        }

        .log-entry {
            border-left: 2px solid var(--neon-pink);
            padding-left: 10px;
            margin-bottom: 10px;
            animation: glitch 0.3s infinite alternate;
            animation-play-state: paused;
        }

        .log-entry:hover { animation-play-state: running; }

        /* Central HUD */
        .main-hud {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .glitch-wrapper {
            position: relative;
        }

        h1 {
            font-size: 6rem;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        h1::before, h1::after {
            content: "HELLO WORLD";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
        }

        h1::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        h1::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-blue);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            /* ... more frames ... */
            100% { clip: rect(89px, 9999px, 98px, 0); }
        }

        /* Decorative Corners */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid var(--neon-blue);
            animation: border-pulse 2s infinite;
        }

        .top-left { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .top-right { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .bottom-right { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        /* Bottom Bar */
        .status-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            font-size: 12px;
            color: var(--neon-yellow);
        }

        .btn-cyber {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue);
        }

    </style>
</head>
<body>

    <div class="scanline"></div>
    <canvas id="matrix"></canvas>

    <div class="viewport">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <aside class="sidebar">
            <div class="log-entry">> UPLINK: STABLE</div>
            <div class="log-entry">> LATENCY: 4ms</div>
            <div class="log-entry">> SIGNAL: ENCRYPTED</div>
            <div id="random-data"></div>
        </aside>

        <main class="main-hud">
            <div class="glitch-wrapper">
                <h1 data-text="HELLO WORLD">HELLO WORLD 🌍</h1>
            </div>
            <p style="color: var(--neon-yellow); margin-top: 20px; letter-spacing: 5px;">NODE: VS_CODE_WEB // SECTOR: 7G</p>
            <br>
            <button class="btn-cyber">Initialize Core</button>
        </main>

        <aside class="sidebar" style="text-align: right; color: var(--neon-blue);">
            <div>CORE_TEMP: 42°C</div>
            <div>MEMORY: 94%</div>
            <div style="margin-top: auto;">ID: GHOST_IN_THE_WEB</div>
        </aside>
    </div>

    <div class="status-footer">
        <span>LOC: 35.6895° N, 139.6917° E</span>
        <span>SYSTEM STATUS: NOMINAL</span>
        <span id="clock">00:00:00</span>
    </div>

    <script>
        // Background Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const char = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f3ff';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < drops.length; i++) {
                const text = char.charAt(Math.floor(Math.random() * char.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Random Log Generator
        const logBox = document.getElementById('random-data');
        setInterval(() => {
            const code = Math.random().toString(16).substring(2, 8).toUpperCase();
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerText = `> PKT_RECV: 0x${code}`;
            logBox.prepend(div);
            if(logBox.children.length > 10) logBox.lastChild.remove();
        }, 1500);

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }

        setInterval(drawMatrix, 50);
        setInterval(updateClock, 1000);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
